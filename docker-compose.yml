services:

  wasmclient:
    container_name: wasmclient
    build:
      context: .
      dockerfile: BlazorWasmAuthentication/Dockerfile
    ports:
      - 8080:80
      # - 7001:7001
    depends_on:
      webapiauthentication:
        condition: service_healthy

  webapiauthentication:
    container_name: webapiauthentication
    build:
      context: .
      dockerfile: WebApiAuthentication/Dockerfile
    depends_on:
      sqlserverdb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sqlserverdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserverdb
    ports:
      - 11433:1433
    environment:
      - ACCEPT_EULA=Y
      - TZ=America/Havana
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:?db password not set}
      - MSSQL_PID=Express
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:?db password not set}", "-C", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
